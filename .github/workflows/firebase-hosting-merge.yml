# This file was auto-generated by the Firebase CLI
# Updated for Flutter Web support

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears the Node.js 20 warning

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install Flutter on the GitHub runner
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 2. Get dependencies and build the project
      - run: flutter pub get
      - run: flutter build web --release

      # 3. Deploy the 'build/web' folder
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DECRYPTOR_29108 }}
          channelId: live
          projectId: decryptor-29108